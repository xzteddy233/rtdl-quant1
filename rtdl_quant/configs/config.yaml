experiment:
  name: alpha158_resnet_baseline
  seed: 42
  output_dir: rtdl_quant/outputs

data:
  source: prices
  prices_dir: prices
  path: data/alpha158_prices.parquet
  auto_prepare: true
  feature_prefix: null
  label_column: label
  future_return_column: future_return
  date_column: date
  code_column: code
  batch_size: 256
  num_workers: 0
  load_max_instruments: 500
  splits:
    train: {start: "2014-01-01", end: "2021-12-31"}
    valid: {start: "2022-01-01", end: "2023-12-31"}
    test: {start: "2024-01-01", end: "2026-06-18"}
  prices_build:
    start_date: "2014-01-01"
    end_date: "2026-06-18"
    horizon: 20
    exclude_st: true
    require_trading: true
    max_instruments: 200

model:
  name: resnet
  d_in: 158
  depth: 4
  width: 256
  hidden_factor: 2.0
  dropout_first: 0.25
  dropout_second: 0.0

trainer:
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.00001
  patience: 12
  gradient_clip_norm: 1.0
  mixed_precision: true
  device: auto

evaluation:
  neutralization:
    enabled: true
    industry: true
    market_cap: true
    standardize: true
    industry_path: industry/industry.csv
    industry_code_column: symbol
    industry_column: industry
