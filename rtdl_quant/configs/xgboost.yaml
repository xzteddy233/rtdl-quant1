experiment:
  name: alpha158_xgboost
  seed: 2004
  output_dir: rtdl_quant/outputs

data:
  source: prices
  prices_dir: prices
  path: data/alpha158_prices.parquet
  auto_prepare: true
  feature_prefix: null
  label_column: label
  future_return_column: future_return
  date_column: date
  code_column: code
  load_max_instruments: 500
  splits:
    train: {start: "2014-01-01", end: "2021-12-31"}
    valid: {start: "2022-01-01", end: "2023-12-31"}
    test: {start: "2024-01-01", end: "2026-06-18"}
  prices_build:
    start_date: "2014-01-01"
    end_date: "2026-06-18"
    horizon: 20
    exclude_st: true
    require_trading: true
    max_instruments: null

model:
  name: xgboost
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.03
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.0
  reg_lambda: 1.0
  min_child_weight: 10
  objective: reg:squarederror
  eval_metric: rmse
  tree_method: hist
  early_stopping_rounds: 50
  n_jobs: -1
  verbose: false

evaluation:
  neutralization:
    enabled: true
    industry: true
    market_cap: true
    standardize: true
    industry_path: industry/industry.csv
    industry_code_column: symbol
    industry_column: industry
