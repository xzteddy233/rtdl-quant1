experiment:
  name: alpha158_catboost
  seed: 2004
  output_dir: rtdl_quant/outputs

data:
  source: prices
  prices_dir: prices
  path: data/alpha158_prices.parquet
  auto_prepare: true
  feature_prefix: null
  label_column: label
  future_return_column: future_return
  date_column: date
  code_column: code
  load_max_instruments: 500
  splits:
    train: {start: "2014-01-01", end: "2021-12-31"}
    valid: {start: "2022-01-01", end: "2023-12-31"}
    test: {start: "2024-01-01", end: "2026-06-18"}
  prices_build:
    start_date: "2014-01-01"
    end_date: "2026-06-18"
    horizon: 20
    exclude_st: true
    require_trading: true
    max_instruments: null

model:
  name: catboost
  iterations: 800
  depth: 6
  learning_rate: 0.03
  l2_leaf_reg: 3.0
  loss_function: RMSE
  eval_metric: RMSE
  od_type: Iter
  od_wait: 50
  bootstrap_type: Bernoulli
  subsample: 0.8
  rsm: 0.8
  thread_count: -1
  fit_verbose: false

evaluation:
  neutralization:
    enabled: true
    industry: true
    market_cap: true
    standardize: true
    industry_path: industry/industry.csv
    industry_code_column: symbol
    industry_column: industry
